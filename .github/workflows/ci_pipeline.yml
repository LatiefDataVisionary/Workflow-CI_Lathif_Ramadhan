name: End-to-End ML Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject_Folder/requirements.txt

      - name: Run MLflow Project (Training)
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject_Folder
          # Menjalankan training melalui MLProject
          mlflow run . 

      - name: Build Docker Image
        run: |
          cd MLProject_Folder
          # Membungkus model yang tersimpan di local_model_dir menjadi Docker Image
          mlflow models build-docker -m "local_model_dir" -n "latief18/telco-churn-model:latest" --enable-mlserver

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: |
          docker push latief18/telco-churn-model:latest
